<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f47b20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Precios Motolife">
<title>Precios Motolife</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f1f0ec; --bg2:#ffffff; --bg3:#e4e2dc;
    --text:#111111; --text2:#2d2d2d; --text3:#7b776f;
    --orange:#f47b20; --black:#111111;
    --green:#238636; --yellow:#b7791f; --red:#b42318;
    --border:rgba(0,0,0,0.12); --border2:rgba(244,123,32,0.55);
    --info-bg:#fff3e8; --warn-bg:#ffe0bf;
    --radius:12px; --radius-lg:22px;
    --mono:'Courier New',Courier,monospace;
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg3); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:0 24px 50px;
  }
  header { width:100%; max-width:1000px; padding:34px 0 24px; display:flex; align-items:center; gap:16px; }
  .logo { width:54px; height:54px; background:var(--black); border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 8px 22px rgba(0,0,0,.22); }
  .logo i { font-size:31px; color:var(--orange); }
  header h1 { font-size:25px; font-weight:800; color:var(--black); line-height:1.1; letter-spacing:-0.4px; }
  header p  { font-size:14px; color:var(--text3); margin-top:4px; }
  .card { width:100%; max-width:1000px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; box-shadow:0 20px 48px rgba(0,0,0,.13); }
  .card-inner { padding:30px; }
  .status-row { display:flex; align-items:center; gap:9px; margin-bottom:18px; }
  .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; background:var(--orange); animation:pulse 1s infinite; }
  .dot.ok  { background:var(--orange); animation:none; }
  .dot.err { background:var(--red); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #status-text { font-size:14px; color:var(--text3); font-weight:500; }
  .search-wrap { position:relative; display:flex; align-items:center; gap:10px; }
  .search-input-wrap { position:relative; flex:1; }
  .s-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); font-size:27px; color:var(--orange); pointer-events:none; }
  #inp { width:100%; padding:18px 62px; font-size:23px; font-family:var(--mono); font-weight:800; border:2px solid var(--border2); border-radius:16px; background:#fff; color:var(--black); outline:none; text-transform:uppercase; }
  #inp:focus { border-color:var(--orange); box-shadow:0 0 0 5px rgba(244,123,32,.18); }
  #inp:disabled { opacity:.5; cursor:not-allowed; }
  #clr-btn { position:absolute; right:15px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:6px; color:var(--text3); display:none; align-items:center; justify-content:center; border-radius:var(--radius); }
  #clr-btn:hover { background:var(--info-bg); color:var(--orange); }
  #clr-btn i { font-size:22px; }
  #cam-btn { flex-shrink:0; width:58px; height:58px; background:var(--black); border:none; border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--orange); box-shadow:0 4px 12px rgba(0,0,0,.18); transition:background .15s; }
  #cam-btn:hover { background:#2a2a28; }
  #cam-btn i { font-size:26px; }
  #cam-btn.active { background:var(--orange); color:#fff; }
  #cam-wrap { margin-top:14px; display:none; position:relative; border:2px solid var(--orange); border-radius:16px; overflow:hidden; background:#000; }
  #cam-wrap.open { display:block; }
  #cam-video { width:100%; display:block; max-height:340px; object-fit:cover; }
  #cam-overlay { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  #cam-close { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.6); border:none; border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; z-index:10; }
  #cam-close i { font-size:20px; }
  #cam-status { padding:10px 16px; font-size:13px; color:var(--text3); background:var(--bg3); border-top:1px solid var(--border); text-align:center; }
  .scan-line { position:absolute; left:10%; right:10%; height:2px; background:var(--orange); opacity:0.8; animation:scanMove 2s linear infinite; box-shadow:0 0 6px var(--orange); }
  @keyframes scanMove { 0%{top:20%} 50%{top:75%} 100%{top:20%} }
  #sugs { margin-top:12px; border:1px solid var(--border); border-radius:18px; overflow:hidden; display:none; max-height:560px; overflow-y:auto; background:#fff; }
  .sort-bar { position:sticky; top:0; z-index:5; display:flex; flex-wrap:wrap; gap:8px; padding:12px; background:#fff; border-bottom:1px solid var(--border); }
  .sort-btn { border:1px solid var(--border2); background:#fff; color:var(--black); border-radius:999px; padding:8px 12px; font-size:12px; font-weight:900; cursor:pointer; }
  .sort-btn.active, .sort-btn:hover { background:var(--orange); color:#fff; }
  .count-label { font-size:12px; color:var(--text3); font-weight:800; padding:8px 12px 4px; background:#fff; }
  .sug-row { display:flex; justify-content:space-between; align-items:center; width:100%; padding:18px 20px; background:#fff; border:none; border-top:1px solid var(--border); cursor:pointer; text-align:left; gap:20px; }
  .sug-row:nth-child(even) { background:#f8f7f4; }
  .sug-row:hover { background:var(--info-bg); }
  .sug-thumb { width:48px; height:48px; border-radius:8px; object-fit:cover; flex-shrink:0; border:1px solid var(--border); background:var(--bg3); }
  .sug-thumb-placeholder { width:48px; height:48px; border-radius:8px; flex-shrink:0; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
  .sug-thumb-placeholder i { font-size:20px; color:var(--border2); }
  .sug-left { display:flex; flex-direction:column; gap:4px; min-width:0; }
  .sug-desc { font-size:18px; font-weight:800; color:var(--black); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sug-code { font-size:13px; font-family:var(--mono); color:var(--text3); font-weight:700; }
  .sug-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .sug-price { font-size:22px; font-weight:900; color:var(--orange); white-space:nowrap; }
  .sug-old-price { font-size:13px; color:var(--text3); text-decoration:line-through; font-weight:700; white-space:nowrap; }
  .sug-discount { font-size:11px; color:#fff; background:var(--orange); padding:2px 7px; border-radius:999px; font-weight:900; white-space:nowrap; }
  #result { margin-top:16px; display:none; }
  .result-card { background:#fff; border:2px solid rgba(244,123,32,.35); border-radius:20px; overflow:hidden; }
  .result-foto-wrap { background:var(--bg3); display:flex; align-items:center; justify-content:center; border-bottom:1px solid var(--border); min-height:200px; padding:10px; }
  .result-foto { width:100%; max-width:500px; max-height:340px; object-fit:contain; display:block; }
  .result-top { padding:22px 24px; border-bottom:1px solid var(--border); }
  .cat-badge { display:inline-block; font-size:12px; padding:4px 12px; border-radius:20px; background:var(--black); color:#fff; margin-bottom:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
  .result-desc { font-size:24px; font-weight:900; color:var(--black); line-height:1.25; margin-bottom:8px; }
  .result-code { font-size:15px; font-family:var(--mono); color:var(--text3); font-weight:700; }
  .price-block { padding:28px 24px; }
  .price-label { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; font-weight:800; }
  .price-val { font-size:60px; font-weight:950; color:var(--orange); letter-spacing:-2px; line-height:1; }
  .price-note { font-size:14px; color:var(--text3); margin-top:9px; }
  .promo-row { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:14px; }
  .old-price { font-size:22px; color:var(--text3); text-decoration:line-through; font-weight:800; }
  .discount-badge { background:var(--black); color:#fff; border-radius:999px; padding:6px 12px; font-size:15px; font-weight:900; }
  .result-stock { padding:15px 24px; border-top:1px solid var(--border); font-size:16px; display:flex; align-items:center; gap:9px; font-weight:900; }
  .stock-ok   { background:rgba(35,134,54,.10);  color:var(--green); }
  .stock-low  { background:rgba(183,121,31,.13); color:var(--yellow); }
  .stock-zero { background:rgba(180,35,24,.10);  color:var(--red); }
  .result-stock i { font-size:21px; }

  /* ── Botón agregar al carrito ── */
  .add-to-cart-btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:18px 24px; margin-top:0;
    background:var(--orange); color:#fff; border:none;
    font-size:17px; font-weight:900; cursor:pointer;
    letter-spacing:.02em; transition:background .15s;
    border-top:1px solid var(--border);
  }
  .add-to-cart-btn:hover { background:#d96a10; }
  .add-to-cart-btn i { font-size:22px; }

  /* ── Carrito flotante ── */
  #cart-bar {
    display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:100; background:var(--black); color:#fff;
    border-radius:999px; padding:14px 22px;
    box-shadow:0 8px 32px rgba(0,0,0,.35);
    align-items:center; gap:14px; cursor:pointer;
    font-weight:900; font-size:16px; white-space:nowrap;
    border:2px solid var(--orange);
    transition: transform .2s;
  }
  #cart-bar.visible { display:flex; }
  #cart-bar:hover { transform:translateX(-50%) scale(1.03); }
  #cart-bar i { font-size:22px; color:var(--orange); }
  #cart-count-badge {
    background:var(--orange); color:#fff; border-radius:50%;
    width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:900;
  }

  /* ── Modal carrito ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.55); align-items:flex-end; justify-content:center;
    touch-action:none;
  }
  .modal-overlay.open .modal-box {
    touch-action:pan-y;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background:#fff; border-radius:24px 24px 0 0;
    width:100%; max-width:680px; max-height:92vh;
    overflow-y:auto; padding:0 0 32px;
    box-shadow:0 -8px 40px rgba(0,0,0,.2);
    -webkit-overflow-scrolling:touch;
  }
  .modal-header {
    position:sticky; top:0; z-index:10;
    background:#fff; padding:20px 24px 16px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { font-size:20px; font-weight:900; color:var(--black); display:flex; align-items:center; gap:10px; }
  .modal-title i { color:var(--orange); font-size:24px; }
  .modal-close { background:none; border:none; cursor:pointer; padding:6px; color:var(--text3); border-radius:8px; }
  .modal-close:hover { background:var(--bg3); }
  .modal-close i { font-size:22px; }
  .modal-section { padding:20px 24px 0; }
  .modal-section-title { font-size:13px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }

  /* Ítems del carrito */
  .cart-item {
    display:flex; align-items:center; gap:12px;
    padding:14px 0; border-bottom:1px solid var(--border);
  }
  .cart-item:last-child { border-bottom:none; }
  .cart-item-info { flex:1; min-width:0; }
  .cart-item-desc { font-size:15px; font-weight:800; color:var(--black); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cart-item-code { font-size:12px; font-family:var(--mono); color:var(--text3); margin-top:2px; }
  .cart-item-price { font-size:16px; font-weight:900; color:var(--orange); white-space:nowrap; }
  .qty-ctrl { display:flex; align-items:center; gap:6px; }
  .qty-btn { width:30px; height:30px; border-radius:50%; border:2px solid var(--border2); background:#fff; cursor:pointer; font-size:18px; font-weight:900; color:var(--orange); display:flex; align-items:center; justify-content:center; line-height:1; }
  .qty-btn:hover { background:var(--info-bg); }
  .qty-num { font-size:15px; font-weight:900; min-width:20px; text-align:center; }
  .remove-btn { background:none; border:none; cursor:pointer; color:var(--text3); padding:4px; border-radius:6px; }
  .remove-btn:hover { color:var(--red); background:rgba(180,35,24,.08); }
  .remove-btn i { font-size:20px; }

  /* Total */
  .cart-total-row {
    margin:16px 24px 0; padding:16px 20px; background:var(--info-bg);
    border-radius:14px; display:flex; justify-content:space-between; align-items:center;
  }
  .cart-total-label { font-size:14px; font-weight:800; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; }
  .cart-total-val { font-size:30px; font-weight:950; color:var(--orange); letter-spacing:-1px; }

  /* Formulario de venta */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-label { font-size:13px; font-weight:800; color:var(--text2); }
  .form-input {
    padding:12px 14px; border:2px solid var(--border); border-radius:12px;
    font-size:15px; font-family:inherit; color:var(--black); background:#fff; outline:none;
    transition:border-color .15s;
    position:relative; z-index:1;
    -webkit-appearance:none;
    touch-action:manipulation;
  }
  .form-input:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(244,123,32,.15); }
  select.form-input { cursor:pointer; }

  /* Botón confirmar */
  .confirm-btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:18px; margin-top:20px;
    background:var(--orange); color:#fff; border:none; border-radius:14px;
    font-size:17px; font-weight:900; cursor:pointer; transition:background .15s;
  }
  .confirm-btn:hover { background:#d96a10; }
  .confirm-btn:disabled { opacity:.5; cursor:not-allowed; }
  .confirm-btn i { font-size:22px; }

  /* Toast */
  #toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--green); color:#fff; padding:14px 22px; border-radius:999px;
    font-size:15px; font-weight:800; z-index:300; opacity:0;
    transition:opacity .3s, transform .3s; pointer-events:none; white-space:nowrap;
    display:flex; align-items:center; gap:8px;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.error { background:var(--red); }
  #toast i { font-size:18px; }

  #empty { margin-top:16px; text-align:center; padding:44px 0; display:none; }
  #empty i { font-size:46px; color:var(--orange); display:block; margin-bottom:12px; }
  #empty p { font-size:17px; color:var(--text2); font-weight:700; }
  #empty .sub { font-size:14px; color:var(--text3); margin-top:6px; font-weight:400; }
  #ts { margin-top:16px; font-size:13px; color:var(--text3); text-align:right; display:none; }
  mark { background:var(--warn-bg); color:var(--black); border-radius:3px; padding:0 3px; }
  footer { margin-top:28px; font-size:13px; color:var(--text3); text-align:center; }

  @media(max-width:640px){
    body{padding:0 10px 34px;}
    header{padding:20px 0 14px;max-width:100%;}
    .logo{width:46px;height:46px;} .logo i{font-size:27px;}
    header h1{font-size:20px;} header p{font-size:12px;}
    .card{max-width:100%;border-radius:18px;} .card-inner{padding:16px;}
    #inp{font-size:18px;padding:16px 54px;} .s-icon{left:16px;font-size:24px;}
    #cam-btn{width:50px;height:50px;} #cam-btn i{font-size:22px;}
    #sugs{max-height:62vh;} .sort-bar{gap:6px;padding:10px;}
    .sort-btn{font-size:11px;padding:7px 9px;}
    .sug-row{padding:15px 14px;gap:12px;}
    .sug-thumb,.sug-thumb-placeholder{width:40px;height:40px;}
    .sug-desc{font-size:15px;} .sug-code{font-size:12px;}
    .sug-price{font-size:18px;} .sug-old-price{font-size:12px;}
    .result-desc{font-size:20px;} .price-val{font-size:52px;} .old-price{font-size:18px;}
    .form-grid{grid-template-columns:1fr;}
    .form-group.full{grid-column:1;}
    .modal-box{border-radius:20px 20px 0 0;}
    #cart-bar{bottom:16px; font-size:14px; padding:12px 18px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><i class="ti ti-motorbike"></i></div>
  <div>
    <h1>Precios Motolife</h1>
    <p>Buscador interno de indumentaria</p>
  </div>
</header>

<div class="card">
  <div class="card-inner">
    <div class="status-row">
      <span class="dot" id="dot"></span>
      <span id="status-text">Cargando artículos…</span>
    </div>
    <div class="search-wrap">
      <div class="search-input-wrap">
        <i class="ti ti-barcode s-icon" aria-hidden="true"></i>
        <input id="inp" type="text"
          placeholder="ESCANEÁ O TIPEÁ EL CÓDIGO…"
          autocomplete="off" autocorrect="off"
          autocapitalize="characters" spellcheck="false" disabled />
        <button id="clr-btn" aria-label="Limpiar">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <button id="cam-btn" aria-label="Escanear con cámara">
        <i class="ti ti-camera" aria-hidden="true"></i>
      </button>
    </div>

    <div id="cam-wrap">
      <video id="cam-video" playsinline autoplay muted></video>
      <canvas id="cam-canvas" style="display:none"></canvas>
      <div id="cam-overlay"><div class="scan-line"></div></div>
      <button id="cam-close"><i class="ti ti-x"></i></button>
      <div id="cam-status">Iniciando cámara…</div>
    </div>

    <div id="sugs"></div>
    <div id="result"></div>
    <div id="empty">
      <i class="ti ti-search-off" aria-hidden="true"></i>
      <p id="empty-msg"></p>
      <p class="sub">Probá tipear parte del código, categoría o descripción</p>
    </div>
    <p id="ts"></p>
  </div>
</div>

<footer>Precios con IVA incluido · Datos actualizados desde Google Sheets</footer>

<!-- Carrito flotante -->
<div id="cart-bar">
  <i class="ti ti-shopping-cart"></i>
  <span id="cart-bar-text">Ver carrito</span>
  <span id="cart-count-badge">0</span>
</div>

<!-- Modal carrito + formulario -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <div class="modal-title"><i class="ti ti-shopping-cart"></i> Carrito de venta</div>
      <button class="modal-close" id="modal-close"><i class="ti ti-x"></i></button>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Artículos</div>
      <div id="cart-items-list"></div>
    </div>

    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cart-total-val">$ 0</span>
    </div>

    <div class="modal-section" style="margin-top:20px;">
      <div class="modal-section-title">Datos de la venta</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Vendedor *</label>
          <select class="form-input" id="f-vendedor">
            <option value="">— Seleccioná —</option>
            <option>NICOLAS BOSCAROL</option>
            <option>JOSE ECHEVERRIA</option>
            <option>PABLO BERTERO</option>
            <option>MARCELO FRANCO</option>
            <option>JOAQUIN FERREYRA</option>
            <option>GONZALO LUCERO</option>
            <option>YOEL GARCIA</option>
            <option>MARIANO BIGONGIARI</option>
            <option>GABRIEL MAURENZI</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input class="form-input" id="f-nombre" type="text" placeholder="Nombre del cliente" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">Apellido *</label>
          <input class="form-input" id="f-apellido" type="text" placeholder="Apellido del cliente" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">DNI *</label>
          <input class="form-input" id="f-dni" type="text" inputmode="numeric" placeholder="Sin puntos" autocomplete="off">
        </div>
        <div class="form-group full">
          <label class="form-label">Comentario (opcional)</label>
          <input class="form-input" id="f-comentario" type="text" placeholder="Ej: cliente de moto RE Himalayan, paga con débito…" autocomplete="off">
        </div>
      </div>
      <button class="confirm-btn" id="confirm-btn">
        <i class="ti ti-check"></i> Confirmar venta
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"><i class="ti ti-check"></i> <span id="toast-msg"></span></div>

<script src="./vendor/zxing-browser.js"></script>

<script>
// ─────────────────────────────────────────────
// CONFIGURACIÓN — ajustá esta URL con la de tu
// Apps Script (la misma o una nueva)
// ─────────────────────────────────────────────
var API_URL    = 'https://script.google.com/macros/s/AKfycbwFYU8jpF7mXw75TC7XbiXH6iwuy8GPz1YZEQxglY1CxcaR89voBoAYj_sjoWoEZMo/exec?action=precios';
var VENTAS_URL = 'https://script.google.com/macros/s/AKfycbzJHQXWErG30kB_yCdaAOMETmUYlV8G_oxgpaDsvt5JWFIwBdw_3eFEP8sXOo-fZvla/exec'; // ← reemplazá con la URL del Apps Script de ventas

var items = [], debounceTimer, currentMatches = [], sortMode = 'stock';
var cameraOpen = false, activeStream = null, scanInterval = null;
var cart = []; // [{item, qty}]

var inp       = document.getElementById('inp');
var clrBtn    = document.getElementById('clr-btn');
var sugsEl    = document.getElementById('sugs');
var resEl     = document.getElementById('result');
var empEl     = document.getElementById('empty');
var empMsg    = document.getElementById('empty-msg');
var statusEl  = document.getElementById('status-text');
var dotEl     = document.getElementById('dot');
var tsEl      = document.getElementById('ts');
var camBtn    = document.getElementById('cam-btn');
var camWrap   = document.getElementById('cam-wrap');
var camClose  = document.getElementById('cam-close');
var camStatus = document.getElementById('cam-status');
var videoEl   = document.getElementById('cam-video');
var canvasEl  = document.getElementById('cam-canvas');
var cartBar      = document.getElementById('cart-bar');
var cartBadge    = document.getElementById('cart-count-badge');
var cartBarText  = document.getElementById('cart-bar-text');
var modalOverlay = document.getElementById('modal-overlay');
var modalClose   = document.getElementById('modal-close');
var confirmBtn   = document.getElementById('confirm-btn');
var toastEl      = document.getElementById('toast');
var toastMsg     = document.getElementById('toast-msg');

/* ── Utilidades ── */
function ars(n) {
  n = Number(n); if (isNaN(n)) return '—';
  return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
}
function esc(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function norm(t) { return String(t||'').toUpperCase().replace(/[\s\-_\.\/]/g,'').trim(); }
function hasPromo(item) { return item.promo!=null&&!isNaN(Number(item.promo))&&Number(item.promo)>0&&Number(item.promo)<Number(item.pvp); }
function finalPrice(item) { return hasPromo(item)?Number(item.promo):Number(item.pvp); }
function discountText(item) {
  if(item.descuento!=null&&!isNaN(Number(item.descuento))) return Math.round(Number(item.descuento))+'% OFF';
  if(hasPromo(item)) return Math.round(100-(Number(item.promo)*100/Number(item.pvp)))+'% OFF';
  return '';
}
function stockClass(item) { var s=Number(item.exist||0); return s<=0?'stock-zero':s<=3?'stock-low':'stock-ok'; }
function stockText(item) { var s=Number(item.exist||0); return s<=0?'Sin stock':s===1?'1 unidad en stock':s+' unidades en stock'; }
function hl(text,q) {
  text=String(text||''); q=String(q||'');
  if(!q||!text) return esc(text);
  var i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i===-1) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}
function thumbHtml(item) {
  if(item.foto) return '<img class="sug-thumb" src="'+esc(item.foto)+'" alt="" onerror="this.style.display=\'none\'">';
  return '<div class="sug-thumb-placeholder"><i class="ti ti-shirt"></i></div>';
}

/* ── Toast ── */
function showToast(msg, isError) {
  toastMsg.textContent = msg;
  toastEl.className = 'show' + (isError ? ' error' : '');
  toastEl.querySelector('i').className = isError ? 'ti ti-alert-circle' : 'ti ti-check';
  setTimeout(function(){ toastEl.className = ''; }, 3200);
}

/* ── Carrito ── */
function cartTotal() {
  return cart.reduce(function(sum, e){ return sum + finalPrice(e.item) * e.qty; }, 0);
}
function cartTotalItems() {
  return cart.reduce(function(sum, e){ return sum + e.qty; }, 0);
}
function updateCartBar() {
  var total = cartTotalItems();
  if (total === 0) {
    cartBar.classList.remove('visible');
  } else {
    cartBar.classList.add('visible');
    cartBadge.textContent = total;
    cartBarText.textContent = ars(cartTotal());
  }
}
function addToCart(item) {
  var found = null;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].item.codigo === item.codigo) { found = cart[i]; break; }
  }
  if (found) { found.qty++; } else { cart.push({item: item, qty: 1}); }
  updateCartBar();
  showToast('Agregado: ' + (item.desc || item.codigo));
}
function removeFromCart(codigo) {
  cart = cart.filter(function(e){ return e.item.codigo !== codigo; });
  updateCartBar();
  renderCartModal();
}
function changeQty(codigo, delta) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].item.codigo === codigo) {
      cart[i].qty += delta;
      if (cart[i].qty <= 0) { cart.splice(i, 1); }
      break;
    }
  }
  updateCartBar();
  renderCartModal();
  if (cart.length === 0) closeModal();
}

function renderCartModal() {
  var listEl = document.getElementById('cart-items-list');
  var totalEl = document.getElementById('cart-total-val');
  if (cart.length === 0) { listEl.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:12px 0;">El carrito está vacío.</p>'; totalEl.textContent = ars(0); return; }
  listEl.innerHTML = cart.map(function(e){
    var promo = hasPromo(e.item) ? '<span style="font-size:11px;color:var(--text3);text-decoration:line-through;margin-left:4px;">'+ars(e.item.pvp)+'</span>' : '';
    return '<div class="cart-item">'+
      '<div class="cart-item-info">'+
        '<div class="cart-item-desc">'+esc(e.item.desc||e.item.codigo)+'</div>'+
        '<div class="cart-item-code">'+esc(e.item.codigo)+'</div>'+
      '</div>'+
      '<div class="qty-ctrl">'+
        '<button class="qty-btn" onclick="changeQty(\''+esc(e.item.codigo)+'\', -1)">−</button>'+
        '<span class="qty-num">'+e.qty+'</span>'+
        '<button class="qty-btn" onclick="changeQty(\''+esc(e.item.codigo)+'\', +1)">+</button>'+
      '</div>'+
      '<div class="cart-item-price">'+ars(finalPrice(e.item) * e.qty)+promo+'</div>'+
      '<button class="remove-btn" onclick="removeFromCart(\''+esc(e.item.codigo)+'\')"><i class="ti ti-trash"></i></button>'+
    '</div>';
  }).join('');
  totalEl.textContent = ars(cartTotal());
}

function openModal() {
  renderCartModal();
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Deshabilitar el input de búsqueda para que no robe el foco
  inp.disabled = true;
  // Enfocar el primer campo del formulario tras la animación
  setTimeout(function() {
    var sel = document.getElementById('f-vendedor');
    if (sel) sel.focus();
  }, 100);
}
function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
  // Rehabilitar el input de búsqueda
  inp.disabled = false;
}

cartBar.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', function(e){ if(e.target===modalOverlay) closeModal(); });

/* ── Confirmar venta ── */
confirmBtn.addEventListener('click', function(){
  var vendedor  = document.getElementById('f-vendedor').value.trim();
  var nombre    = document.getElementById('f-nombre').value.trim();
  var apellido  = document.getElementById('f-apellido').value.trim();
  var dni       = document.getElementById('f-dni').value.trim();
  var comentario= document.getElementById('f-comentario').value.trim();

  if (!vendedor || !nombre || !apellido || !dni) {
    showToast('Completá todos los campos obligatorios', true); return;
  }
  if (cart.length === 0) {
    showToast('El carrito está vacío', true); return;
  }

  confirmBtn.disabled = true;
  confirmBtn.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Enviando…';

  var payload = {
    action:    'nuevaVenta',
    vendedor:  vendedor,
    nombre:    nombre,
    apellido:  apellido,
    dni:       dni,
    comentario:comentario,
    items: cart.map(function(e){
      return {
        codigo:    e.item.codigo,
        desc:      e.item.desc || '',
        cat:       e.item.cat  || '',
        pvp:       e.item.pvp,
        promo:     e.item.promo || '',
        precioFinal: finalPrice(e.item),
        qty:       e.qty,
        subtotal:  finalPrice(e.item) * e.qty
      };
    }),
    total: cartTotal()
  };

  // Apps Script con GitHub Pages siempre da error CORS en la respuesta,
  // pero el POST llega y se graba correctamente. Usamos no-cors y asumimos éxito.
  fetch(VENTAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(function() {
    // Con no-cors la respuesta es opaca (no legible) pero la venta se grabó
    showToast('¡Venta registrada correctamente!');
    cart = [];
    updateCartBar();
    closeModal();
    document.getElementById('f-vendedor').value = '';
    document.getElementById('f-nombre').value = '';
    document.getElementById('f-apellido').value = '';
    document.getElementById('f-dni').value = '';
    document.getElementById('f-comentario').value = '';
  })
  .catch(function(err){
    showToast('Error de conexión: ' + err.message, true);
  })
  .finally(function(){
    confirmBtn.disabled = false;
    confirmBtn.innerHTML = '<i class="ti ti-check"></i> Confirmar venta';
  });
});

/* ── UI ── */
function hideAll() { sugsEl.style.display='none'; resEl.style.display='none'; empEl.style.display='none'; }
function clearAll() { inp.value=''; clrBtn.style.display='none'; currentMatches=[]; hideAll(); inp.focus(); }
clrBtn.addEventListener('click', clearAll);

/* ── Pistola ── */
var lastKeyTime=0, isScanningGun=false;
document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(document.activeElement!==inp) inp.focus();
  if(e.key==='Escape') clearAll();
});
document.addEventListener('keypress',function(e){
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  var now=Date.now(),diff=now-lastKeyTime; lastKeyTime=now;
  if(diff<50&&e.key.length===1){if(!isScanningGun){isScanningGun=true;inp.value='';}}
  else{isScanningGun=false;}
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&isScanningGun){isScanningGun=false;clearTimeout(debounceTimer);search(inp.value);}
});

/* ── Cámara ── */
var zxingReader = null, scanBusy = false, detector = null;

function cargarZXing() {
  if (window.ZXingBrowser) return Promise.resolve();
  return Promise.reject(new Error('ZXing local no cargó.'));
}
function abrirCamara() {
  if (cameraOpen) { cerrarCamara(); return; }
  camWrap.classList.add('open'); camBtn.classList.add('active');
  camBtn.querySelector('i').className='ti ti-camera-off';
  cameraOpen=true; camStatus.textContent='Solicitando acceso a la cámara…';
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){camStatus.textContent='Este navegador no permite usar la cámara.';return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false})
  .then(function(stream){
    activeStream=stream; videoEl.srcObject=stream;
    videoEl.onloadedmetadata=function(){
      videoEl.play().then(function(){camStatus.textContent='Cámara lista. Cargando lector…';iniciarScanCanvas();}).catch(function(e){camStatus.textContent='Error de video: '+e.message;});
    };
  }).catch(function(err){camStatus.textContent=err.name==='NotAllowedError'?'Permiso denegado — habilitá la cámara en Ajustes > Safari.':'Error cámara: '+err.message;});
}
function prepararBarcodeDetector(){try{if('BarcodeDetector' in window){detector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','code_93','upc_a','upc_e','itf']});}}catch(e){detector=null;}}
function iniciarScanCanvas(){
  prepararBarcodeDetector();
  cargarZXing().then(function(){
    try{zxingReader=new ZXingBrowser.BrowserMultiFormatReader();camStatus.textContent='Apuntá al código. Mantenelo horizontal y bien iluminado…';iniciarLoopEscaneo();}
    catch(e){camStatus.textContent='El lector cargó, pero no pudo iniciar: '+e.message;}
  }).catch(function(){
    if(detector){camStatus.textContent='ZXing no cargó. Probando lector nativo…';iniciarLoopEscaneo();}
    else{camStatus.textContent='No se pudo cargar el lector local.';}
  });
}
function iniciarLoopEscaneo(){
  var ctx=canvasEl.getContext('2d',{willReadFrequently:true});
  scanInterval=setInterval(function(){
    if(!cameraOpen||scanBusy||!videoEl.videoWidth||!videoEl.videoHeight) return;
    scanBusy=true;
    try{
      var vw=videoEl.videoWidth,vh=videoEl.videoHeight;
      var cropX=Math.round(vw*.05),cropW=Math.round(vw*.90),cropH=Math.round(vh*.34),cropY=Math.round((vh-cropH)/2);
      var maxW=900,scale=cropW>maxW?maxW/cropW:1;
      canvasEl.width=Math.round(cropW*scale); canvasEl.height=Math.round(cropH*scale);
      ctx.drawImage(videoEl,cropX,cropY,cropW,cropH,0,0,canvasEl.width,canvasEl.height);
      var img=ctx.getImageData(0,0,canvasEl.width,canvasEl.height),data=img.data;
      for(var i=0;i<data.length;i+=4){var gray=(data[i]*.299+data[i+1]*.587+data[i+2]*.114);var v=gray>145?255:0;data[i]=data[i+1]=data[i+2]=v;}
      ctx.putImageData(img,0,0);
      leerCanvas().then(function(code){scanBusy=false;if(code)codigoDetectado(code);}).catch(function(){scanBusy=false;});
    }catch(e){scanBusy=false;}
  },500);
}
function leerCanvas(){
  if(detector){return detector.detect(canvasEl).then(function(codes){if(codes&&codes.length&&codes[0].rawValue)return codes[0].rawValue;return leerCanvasZXing();}).catch(function(){return leerCanvasZXing();});}
  return leerCanvasZXing();
}
function leerCanvasZXing(){
  if(!zxingReader) return Promise.resolve('');
  if(typeof zxingReader.decodeFromCanvas==='function'){
    try{return Promise.resolve(zxingReader.decodeFromCanvas(canvasEl)).then(function(r){return r&&typeof r.getText==='function'?r.getText():'';}).catch(function(){return '';});}catch(e){return Promise.resolve('');}
  }
  if(typeof zxingReader.decodeFromImageElement==='function'){
    return new Promise(function(resolve){
      var img=new Image();
      img.onload=function(){try{Promise.resolve(zxingReader.decodeFromImageElement(img)).then(function(r){resolve(r&&typeof r.getText==='function'?r.getText():'');}).catch(function(){resolve('');});}catch(e){resolve('');}};
      img.onerror=function(){resolve('');};
      img.src=canvasEl.toDataURL('image/png');
    });
  }
  return Promise.resolve('');
}
function codigoDetectado(code){code=String(code||'').trim();if(!code)return;inp.value=code.toUpperCase();cerrarCamara();search(code);}
function cerrarCamara(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  scanBusy=false;
  if(zxingReader&&zxingReader.reset){try{zxingReader.reset();}catch(e){}}
  if(activeStream){try{activeStream.getTracks().forEach(function(t){t.stop();});}catch(e){}activeStream=null;}
  videoEl.srcObject=null;
  camWrap.classList.remove('open'); camBtn.classList.remove('active');
  camBtn.querySelector('i').className='ti ti-camera'; cameraOpen=false;
}
camBtn.addEventListener('click',abrirCamara);
camClose.addEventListener('click',cerrarCamara);

/* ── Ordenamiento ── */
function sortMatches(arr){
  arr=arr.slice();
  if(sortMode==='az') arr.sort(function(a,b){return String(a.desc||a.codigo).localeCompare(String(b.desc||b.codigo),'es');});
  else if(sortMode==='za') arr.sort(function(a,b){return String(b.desc||b.codigo).localeCompare(String(a.desc||a.codigo),'es');});
  else if(sortMode==='price_asc') arr.sort(function(a,b){return finalPrice(a)-finalPrice(b);});
  else if(sortMode==='price_desc') arr.sort(function(a,b){return finalPrice(b)-finalPrice(a);});
  else arr.sort(function(a,b){return Number(b.exist||0)-Number(a.exist||0);});
  return arr;
}

/* ── Render sugerencias ── */
function renderMatches(matches,t){
  var sorted=sortMatches(matches);
  var html='<div class="sort-bar">'+
    '<button class="sort-btn '+(sortMode==='stock'?'active':'')+'" data-sort="stock">STOCK</button>'+
    '<button class="sort-btn '+(sortMode==='az'?'active':'')+'" data-sort="az">A-Z</button>'+
    '<button class="sort-btn '+(sortMode==='za'?'active':'')+'" data-sort="za">Z-A</button>'+
    '<button class="sort-btn '+(sortMode==='price_asc'?'active':'')+'" data-sort="price_asc">$ MENOR</button>'+
    '<button class="sort-btn '+(sortMode==='price_desc'?'active':'')+'" data-sort="price_desc">$ MAYOR</button>'+
    '</div><div class="count-label">'+sorted.length.toLocaleString('es-AR')+' artículos encontrados</div>';
  html+=sorted.map(function(s){
    var ph=hasPromo(s)?'<span class="sug-old-price">'+ars(s.pvp)+'</span><span class="sug-discount">'+esc(discountText(s))+'</span>':'';
    return '<button class="sug-row" data-codigo="'+esc(s.codigo)+'">'+thumbHtml(s)+
      '<div class="sug-left"><span class="sug-desc">'+(hl(s.desc,t)||esc(s.codigo))+'</span><span class="sug-code">'+esc(s.cat||'')+' / '+hl(s.codigo,t)+'</span></div>'+
      '<div class="sug-right"><span class="sug-price">'+ars(finalPrice(s))+'</span>'+ph+'</div></button>';
  }).join('');
  sugsEl.innerHTML=html; sugsEl.style.display='block';
  sugsEl.querySelectorAll('.sort-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();sortMode=btn.getAttribute('data-sort');renderMatches(currentMatches,inp.value);});
  });
  sugsEl.querySelectorAll('.sug-row').forEach(function(btn){
    btn.addEventListener('click',function(){
      var c=btn.getAttribute('data-codigo');
      for(var i=0;i<items.length;i++){if(items[i].codigo===c){inp.value=items[i].codigo;showResult(items[i]);sugsEl.style.display='none';return;}}
    });
  });
}

/* ── Búsqueda ── */
function search(q){
  var t=q.trim(); hideAll();
  if(!t){clrBtn.style.display='none';currentMatches=[];return;}
  clrBtn.style.display='flex';
  var tn=norm(t),exact=null;
  for(var i=0;i<items.length;i++){if(norm(items[i].codigo)===tn){exact=items[i];break;}}
  if(exact){currentMatches=[];showResult(exact);return;}
  var matches=items.filter(function(it){
    return norm(it.codigo).indexOf(tn)!==-1||String(it.desc||'').toUpperCase().indexOf(t.toUpperCase())!==-1||String(it.cat||'').toUpperCase().indexOf(t.toUpperCase())!==-1;
  });
  currentMatches=matches;
  if(matches.length===1){showResult(matches[0]);return;}
  if(matches.length>1){renderMatches(matches,t);return;}
  empMsg.textContent='No se encontró "'+t+'"';
  empEl.style.display='block';
}

/* ── Mostrar resultado ── */
function showResult(item){
  resEl.innerHTML='';
  var card=document.createElement('div'); card.className='result-card';
  var fw=document.createElement('div'); fw.className='result-foto-wrap';
  if(item.foto){var img=document.createElement('img');img.className='result-foto';img.src=item.foto;img.alt=item.desc||'';img.onerror=function(){fw.style.display='none';};fw.appendChild(img);}
  else{fw.style.display='none';}
  card.appendChild(fw);
  var top=document.createElement('div'); top.className='result-top';
  top.innerHTML='<span class="cat-badge">'+esc(item.cat||'SIN CATEGORÍA')+'</span><div class="result-desc">'+esc(item.desc||item.codigo)+'</div><div class="result-code">'+esc(item.codigo)+'</div>';
  card.appendChild(top);
  var pb=document.createElement('div'); pb.className='price-block';
  var ph=hasPromo(item)?'<div class="promo-row"><span class="old-price">'+ars(item.pvp)+'</span><span class="discount-badge">'+esc(discountText(item))+'</span></div>':'';
  pb.innerHTML='<div class="price-label">'+(hasPromo(item)?'Precio promoción con IVA':'Precio final con IVA')+'</div><div class="price-val">'+ars(finalPrice(item))+'</div>'+ph+'<div class="price-note">'+(hasPromo(item)?'Precio promocional':'Precio de venta al público')+'</div>';
  card.appendChild(pb);
  if(item.exist!=null){var st=document.createElement('div');st.className='result-stock '+stockClass(item);st.innerHTML='<i class="ti ti-package"></i>'+esc(stockText(item));card.appendChild(st);}

  // Botón agregar al carrito
  var addBtn=document.createElement('button');
  addBtn.className='add-to-cart-btn';
  addBtn.innerHTML='<i class="ti ti-shopping-cart-plus"></i> Agregar al carrito';
  addBtn.addEventListener('click',function(){ addToCart(item); });
  card.appendChild(addBtn);

  resEl.appendChild(card); resEl.style.display='block';
  tsEl.textContent='Última consulta: '+new Date().toLocaleTimeString('es-AR');
  tsEl.style.display='block';
  resEl.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ── Input ── */
inp.addEventListener('input',function(e){clearTimeout(debounceTimer);debounceTimer=setTimeout(function(){search(e.target.value);},150);});
inp.addEventListener('keydown',function(e){if(e.key==='Enter'){clearTimeout(debounceTimer);search(inp.value);}if(e.key==='Escape')clearAll();});

/* ── Spin animation ── */
var style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

/* ── Carga de datos ── */
fetch(API_URL)
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(data){
    items=Array.isArray(data)?data:[];
    statusEl.textContent=items.length.toLocaleString('es-AR')+' artículos listos';
    dotEl.className='dot ok'; inp.disabled=false; inp.focus();
  })
  .catch(function(err){statusEl.textContent='Error al cargar: '+err.message;dotEl.className='dot err';});
</script>
